# kurt_v1 config example
# Place at: ~/.config/kurt/config.toml
# Or set:   export KURT_CONFIG=/path/to/config.toml

style = "minimal"  # minimal | powerline

# Minimal style colors (foreground only; ANSI 256)
[colors]
# sky-blue-ish
# dir = 33
# git = 24
# duration = 221
# exit = 160

# Powerline palette (ANSI 256 colors)
[powerline.dir]
fg = 15
bg = 31

[powerline.git]
fg = 15
bg = 28

[powerline.duration]
fg = 16
bg = 220

[powerline.exit]
fg = 15
bg = 160

[prompt]
# true = two-line prompt, false = one-line prompt
two_line = true

[perf]
# Cache TTL for git status (milliseconds)
git_ttl_ms = 1000

[readability]
# Path shortening
# Show last N folders (default 3)
dir_max_depth = 3
# Add leading … when shortened
dir_truncate_mid = true

# Git branch shortening
# Max branch length before truncation
git_branch_max_len = 28
# If true, keep only last segment after '/' (recommended)
git_branch_tail = true

# Exit formatting
# true => ✗1, false => exit=1
exit_compact = true

[rprompt]
# zsh RPROMPT (right side)
enabled = true
show_time = true
# Go time format: https://pkg.go.dev/time#Time.Format
# 15:04 = 24h hours:minutes
# 03:04 PM = 12h time
time_format = "15:04"

[modules]
# Module order (unknown names are ignored)
order = ["dir", "git", "duration", "exit"]

[module.dir]
enabled = true

[module.git]
enabled = true

[module.duration]
enabled = true
# Show duration only if command took at least this long
min_ms = 500

[module.exit]
enabled = true
