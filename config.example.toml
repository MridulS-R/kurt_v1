# kurt_v1 config example
# Place at: ~/.config/kurt/config.toml
# Or set:   export KURT_CONFIG=/path/to/config.toml

style = "minimal"  # minimal | powerline

# Minimal style colors (foreground only; ANSI 256)
[colors]
# sky-blue-ish
# dir = 33
# git = 24
# duration = 221
# exit = 160

# Powerline palette (ANSI 256 colors)
[powerline.dir]
fg = 15
bg = 31

[powerline.git]
fg = 15
bg = 28

[powerline.duration]
fg = 16
bg = 220

[powerline.exit]
fg = 15
bg = 160

[prompt]
# true = two-line prompt, false = one-line prompt
two_line = true

[perf]
# Cache TTL for git status (milliseconds)
git_ttl_ms = 1000

[readability]
# Path shortening
# Show last N folders (default 3)
dir_max_depth = 3
# Add leading … when shortened
dir_truncate_mid = true

# Git branch shortening
# Max branch length before truncation
git_branch_max_len = 28
# If true, keep only last segment after '/' (recommended)
git_branch_tail = true

# Exit formatting
# true => ✗1, false => exit=1
exit_compact = true

[rprompt]
# zsh RPROMPT (right side)
enabled = true
show_time = true
# Go time format: https://pkg.go.dev/time#Time.Format
# 15:04 = 24h hours:minutes
# 03:04 PM = 12h time
time_format = "15:04"

[modules]
# Module order (unknown names are ignored)
order = ["dir", "git", "duration", "exit"]

[module.dir]
enabled = true

[module.git]
enabled = true

[module.duration]
enabled = true
# Show duration only if command took at least this long
min_ms = 500

[module.exit]
enabled = true

# ── AI assistant (kurt think) ────────────────────────────────────────────────
[think]
# Provider to use. Options:
#   ollama        Local Ollama server (default, no API key needed)
#   openai        OpenAI API           → set OPENAI_API_KEY
#   anthropic     Anthropic Claude     → set ANTHROPIC_API_KEY
#   groq          Groq (very fast)     → set GROQ_API_KEY
#   together      Together AI          → set TOGETHER_API_KEY
#   openrouter    OpenRouter           → set OPENROUTER_API_KEY
#   lmstudio      LM Studio (local)    → no API key needed
#   openai-compat Any OpenAI-compat    → set base_url + OPENAI_API_KEY
provider = "ollama"

# Override the model for the chosen provider.
# Leave empty to use the provider's default model.
# model = "gpt-4o"

# For openai-compat: set the base URL of your custom endpoint.
# base_url = "http://localhost:8080/v1"

# For ollama: override the server address.
# host = "http://127.0.0.1:11434"
