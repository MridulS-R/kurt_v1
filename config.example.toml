# kurt_v1 config example
# Place at: ~/.config/kurt/config.toml
# Or set:   export KURT_CONFIG=/path/to/config.toml

style = "minimal"  # minimal | powerline

# Powerline palette (ANSI 256 colors)
[powerline.dir]
fg = 15
bg = 31

[powerline.git]
fg = 15
bg = 28

[powerline.duration]
fg = 16
bg = 220

[powerline.exit]
fg = 15
bg = 160

[prompt]
# true = two-line prompt, false = one-line prompt
two_line = true

[perf]
# Cache TTL for git status (milliseconds)
git_ttl_ms = 1000

[rprompt]
# zsh RPROMPT (right side)
enabled = true
show_time = true
# Go time format: https://pkg.go.dev/time#Time.Format
# 15:04 = 24h hours:minutes
# 03:04 PM = 12h time
time_format = "15:04"

[modules]
# Module order (unknown names are ignored)
order = ["dir", "git", "duration", "exit"]

[module.dir]
enabled = true

[module.git]
enabled = true

[module.duration]
enabled = true
# Show duration only if command took at least this long
min_ms = 500

[module.exit]
enabled = true
